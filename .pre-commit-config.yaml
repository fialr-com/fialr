# Pre-commit hooks for the public docs repo.
#   Install: uvx pre-commit install   (or pipx run pre-commit install)
default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: docs-parity
        name: docs-parity (command references match feature-manifest)
        entry: python scripts/check_docs_parity.py
        language: system
        pass_filenames: false
        files: \.md$|feature-manifest\.json$
